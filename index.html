<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguoKids: The Word Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-color: #6366f1;
            --s-color: #f43f5e;
            --bg-color: #f5f3ff;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            overflow-x: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .font-game { font-family: 'Quicksand', sans-serif; font-weight: 500; }
        .font-bold-game { font-family: 'Quicksand', sans-serif; font-weight: 700; }

        .btn-bounce {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
        }
        .btn-bounce:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 4px solid white;
            border-radius: 40px;
        }

        .auto-play-highlight {
            transform: scale(1.15) !important;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.6), inset 0 0 20px rgba(255,255,255,1) !important;
            border-color: #6366f1 !important;
            z-index: 20;
        }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
        }

        .robot-default-pos {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
        }

        .robot-spelling-pos {
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            transform: none !important;
            margin: 20px auto 0 auto;
        }

        .is-talking img {
            animation: mouthMove 0.25s infinite alternate ease-in-out;
        }
        @keyframes mouthMove { from { transform: scaleY(1); } to { transform: scaleY(0.9); } }

        .drop-zone {
            min-width: 150px;
            height: 60px;
            border-bottom: 5px dashed #6366f1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            margin: 0 10px;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- HUD -->
    <div class="fixed top-0 left-0 right-0 p-4 z-50 flex justify-between items-start pointer-events-none">
        <div class="flex flex-col gap-2 pointer-events-auto">
            <div class="glass px-6 py-2 flex items-center gap-3 shadow-xl">
                <span class="text-3xl">💎</span>
                <span id="stars-count" class="text-2xl font-bold-game text-indigo-600">0</span>
            </div>
        </div>
    </div>

    <!-- EL ROBOT -->
    <div id="mission-toast" class="robot-default-pos animate__animated animate__fadeInUp flex flex-col items-center gap-2 pointer-events-none">
        <p class="bg-white/90 px-4 py-2 rounded-2xl border-2 border-indigo-200 text-xs font-bold text-indigo-800 uppercase shadow-lg text-center max-w-[250px]" id="leo-talk">Hello! Let's play.</p>
        <div id="leo-avatar-container" class="w-20 h-20 bg-white/90 rounded-full border-4 border-white flex items-center justify-center overflow-hidden shadow-2xl pointer-events-auto">
            <img id="hud-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Sparky" class="w-full h-full" alt="Avatar">
        </div>
    </div>

    <!-- MODAL DE NOMBRE -->
    <div id="name-modal" class="fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-6 hidden">
        <div class="glass max-w-md w-full p-8 text-center animate__animated animate__zoomIn">
            <h3 class="text-3xl font-bold-game text-indigo-600 mb-4">WELCOME HERO!</h3>
            <p class="text-slate-600 mb-6 font-medium">Type your name to start the quest:</p>
            <input type="text" id="student-name" placeholder="Your name..." class="w-full p-4 rounded-2xl border-4 border-indigo-100 focus:border-indigo-400 outline-none text-xl text-center font-bold mb-6">
            <button onclick="confirmNameAndStart()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold-game text-xl btn-bounce">START QUEST! 🚀</button>
        </div>
    </div>

    <!-- ONBOARDING -->
    <div id="onboarding" class="fixed inset-0 z-[100] bg-yellow-400 flex flex-col items-center justify-center p-6 text-indigo-900 overflow-y-auto">
        <div class="max-w-xl w-full text-center py-10 flex-grow flex flex-col justify-center">
            <div class="mb-4 animate__animated animate__fadeInDown">
                <h1 class="text-7xl font-bold-game tracking-wider drop-shadow-lg">FOOTPRINTS</h1>
                <p class="text-3xl font-game text-indigo-800 mt-2 uppercase tracking-widest">UNIT 9 SECOND GRADE</p>
            </div>
            <div class="w-24 h-1 bg-indigo-900/20 mx-auto my-8 rounded-full"></div>
            <h2 class="text-4xl font-game mb-8">CHOOSE YOUR HERO!</h2>
            <div class="grid grid-cols-2 gap-6 mb-12">
                <div onclick="selectPower('blue', 'Sparky')" class="glass p-6 cursor-pointer hover:scale-105 transition-all group border-indigo-200">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Sparky" class="w-32 h-32 mx-auto group-hover:rotate-12 transition-transform">
                    <p class="mt-4 font-bold-game text-indigo-600 uppercase">Blue Bolt</p>
                </div>
                <div onclick="selectPower('pink', 'Luna')" class="glass p-6 cursor-pointer hover:scale-105 transition-all group border-pink-200">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Luna" class="w-32 h-32 mx-auto group-hover:-rotate-12 transition-transform">
                    <p class="mt-4 font-bold-game text-pink-600 uppercase">Pink Fire</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE BASE DE DATOS -->
    <div id="db-modal" class="fixed inset-0 z-[300] modal-overlay flex items-center justify-center p-6 hidden">
        <div class="glass max-w-2xl w-full p-8 animate__animated animate__fadeInUp flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold-game text-indigo-600">HALL OF FAME 🏆</h3>
                <button onclick="closeDB()" class="text-slate-400 hover:text-slate-600 text-3xl">&times;</button>
            </div>
            <div class="overflow-y-auto flex-grow rounded-2xl border-2 border-indigo-50">
                <table class="w-full text-left">
                    <thead class="bg-indigo-50 sticky top-0">
                        <tr>
                            <th class="p-4 font-bold-game text-indigo-600">Name</th>
                            <th class="p-4 font-bold-game text-indigo-600">Quiz</th>
                            <th class="p-4 font-bold-game text-indigo-600">Sentences</th>
                            <th class="p-4 font-bold-game text-indigo-600">Date</th>
                        </tr>
                    </thead>
                    <tbody id="db-list-content">
                        <!-- Content via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <main id="game-container" class="flex-grow pt-24 pb-32 px-4 transition-all duration-500 opacity-0 flex flex-col">
        
        <!-- MISSION 1: LEARN -->
        <section id="learn-section" class="hidden w-full">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 max-w-6xl mx-auto" id="learn-grid"></div>
            <div id="autoplay-container" class="mt-12 flex justify-center w-full">
                <button id="autoplay-btn" onclick="startAutoLearn()" class="px-8 py-4 bg-gradient-r from-indigo-500 to-purple-600 text-white rounded-3xl font-bold-game text-2xl btn-bounce flex items-center gap-3">
                    <span id="autoplay-icon">▶️</span> <span id="autoplay-text">AUTO-PLAY LESSON</span>
                </button>
            </div>
        </section>

        <!-- MISSION 2: SPELLING -->
        <section id="spelling-section" class="hidden max-w-2xl mx-auto w-full">
            <div class="glass p-10 text-center relative">
                <div class="flex items-center justify-center gap-4 mb-4">
                    <div id="spelling-icon" class="text-9xl animate__animated animate__bounceIn">❓</div>
                    <button id="spelling-repeat-btn" class="w-16 h-16 bg-white border-4 border-indigo-400 rounded-full flex items-center justify-center text-2xl shadow-lg btn-bounce">🔊</button>
                </div>
                <div id="spelling-slots" class="flex justify-center flex-wrap gap-4 mb-12 min-h-[100px]"></div>
                <div id="spelling-letters" class="flex flex-wrap justify-center gap-4"></div>
                <div class="mt-12 h-6 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div id="spelling-progress" class="h-full bg-indigo-500 transition-all duration-700" style="width: 0%"></div>
                </div>
                <div id="robot-anchor-spelling"></div>
            </div>
        </section>

        <!-- MISSION 3: QUIZ -->
        <section id="quiz-section" class="hidden max-w-2xl mx-auto w-full">
            <div id="quiz-card" class="glass p-12 text-center shadow-2xl min-h-[500px] flex flex-col justify-center"></div>
        </section>

        <!-- MISSION 4: SENTENCES -->
        <section id="sentences-section" class="hidden max-w-3xl mx-auto w-full">
            <div id="sentence-card" class="glass p-12 text-center shadow-2xl min-h-[450px] flex flex-col justify-center">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold-game text-indigo-600 uppercase">Complete the sentence!</h3>
                    <button id="sentence-repeat-btn" class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-xl btn-bounce">🔊</button>
                </div>
                <div id="sentence-display" class="text-3xl font-game text-slate-700 mb-12 leading-relaxed"></div>
                <div id="sentence-options" class="grid grid-cols-2 gap-4"></div>
                <div class="mt-12 h-4 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div id="sentence-progress" class="h-full bg-green-500 transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
        </section>

    </main>

    <!-- PIE DE PAGINA -->
    <footer class="p-4 text-center text-indigo-400 font-medium text-sm">
        By: Ing. Milko Gonzales C.
    </footer>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Auth Logic
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        window.dbRef = db;
        window.appIdRef = appId;
        window.saveGameRecord = async (name, qScore, sScore) => {
            if (!auth.currentUser) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'certificates'), {
                    name,
                    quizScore: qScore,
                    sentenceScore: sScore,
                    timestamp: serverTimestamp(),
                    userId: auth.currentUser.uid
                });
            } catch (e) { console.error("Error saving to DB", e); }
        };

        window.fetchGameRecords = async () => {
            if (!auth.currentUser) return [];
            try {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'certificates'));
                const snapshot = await getDocs(q);
                return snapshot.docs.map(doc => doc.data());
            } catch (e) { 
                console.error("Error fetching", e); 
                return [];
            }
        };
    </script>

    <script>
        const originalVocabulary = [
            { word: 'DISH', icon: '🍽️' }, { word: 'WHAT', icon: '❓' }, { word: 'THAN', icon: '⚖️' },
            { word: 'CHEST', icon: '📦' }, { word: 'SUCH', icon: '🌟' }, { word: 'THIN', icon: '📏' },
            { word: 'PUSH', icon: '🚪' }, { word: 'SHINE', icon: '✨' }, { word: 'CHASE', icon: '🏃' },
            { word: 'WHILE', icon: '⏳' }, { word: 'CATCH', icon: '🧤' }, { word: 'SURE', icon: '✅' },
            { word: 'WHICH', icon: '🧙' }, { word: 'THEN', icon: '➡️' }, { word: 'WHISPER', icon: '🤫' },
            { word: 'THUMB', icon: '👍' }
        ];

        const sentenceQuests = [
            { text: "Put the food on the _.", answer: "DISH" },
            { text: "_ is your favorite color?", answer: "WHAT" },
            { text: "A horse is bigger _ a dog.", answer: "THAN" },
            { text: "The treasure is inside the _.", answer: "CHEST" },
            { text: "It is _ a beautiful day!", answer: "SUCH" },
            { text: "The paper is very _.", answer: "THIN" },
            { text: "Don't pull the door, _ it.", answer: "PUSH" },
            { text: "The sun will _ today.", answer: "SHINE" },
            { text: "Dogs like to _ cats.", answer: "CHASE" },
            { text: "I read _ I wait.", answer: "WHILE" },
            { text: "Try to _ the ball!", answer: "CATCH" },
            { text: "Are you _ you want to go?", answer: "SURE" },
            { text: "The spooky _ lives in the house.", answer: "WHICH" },
            { text: "First wash, _ eat.", answer: "THEN" },
            { text: "Don't shout, just _.", answer: "WHISPER" },
            { text: "Give a _ up if you like it.", answer: "THUMB" }
        ];

        let state = {
            stars: 0, heroName: 'Sparky', studentName: '', currentSection: 'learn',
            spellingIdx: 0, quizIdx: 0, quizCorrect: 0, 
            sentenceIdx: 0, sentenceCorrect: 0,
            learnedWords: new Set(), isAutoplaying: false
        };

        const praisePhrases = ["Good job!", "Amazing!", "You got it!", "Excellent!", "Perfect!", "Way to go!"];

        function celebrate() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#6366f1', '#f43f5e', '#fbbf24', '#22c55e']
            });
            const phrase = praisePhrases[Math.floor(Math.random() * praisePhrases.length)];
            updateSpeech(phrase);
        }

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'l') {
                e.preventDefault();
                cheatToDiploma();
            }
        });

        function cheatToDiploma() {
            state.quizCorrect = 16;
            state.sentenceCorrect = 16;
            state.quizIdx = 16;
            state.sentenceIdx = 16;
            state.stars += 32;
            document.getElementById('stars-count').innerText = state.stars;
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`sentences-section`).classList.remove('hidden');
            state.currentSection = 'sentences';
            finishQuest();
        }

        function selectPower(color, name) {
            state.heroName = name;
            document.getElementById('hud-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${name}`;
            document.getElementById('name-modal').classList.remove('hidden');
        }

        function confirmNameAndStart() {
            const inputName = document.getElementById('student-name').value;
            if(!inputName.trim()) return;
            state.studentName = inputName;
            document.getElementById('name-modal').classList.add('hidden');
            document.getElementById('onboarding').classList.add('animate__animated', 'animate__fadeOutUp');
            setTimeout(() => {
                document.getElementById('onboarding').classList.add('hidden');
                document.getElementById('game-container').classList.remove('opacity-0');
                startMission('learn');
            }, 500);
        }

        function updateSpeech(text, onEndCallback = null) {
            if (!window.speechSynthesis) return;
            speechSynthesis.cancel();
            document.getElementById('leo-talk').innerText = text;
            const utter = new SpeechSynthesisUtterance(text.toLowerCase());
            utter.lang = 'en-US'; utter.rate = 0.9;
            const avatarContainer = document.getElementById('leo-avatar-container');
            utter.onstart = () => avatarContainer.classList.add('is-talking');
            utter.onend = () => {
                avatarContainer.classList.remove('is-talking');
                if (onEndCallback) onEndCallback();
            };
            speechSynthesis.speak(utter);
            return utter;
        }

        function startMission(id) {
            state.isAutoplaying = false;
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`${id}-section`).classList.remove('hidden');
            state.currentSection = id;
            
            const robot = document.getElementById('mission-toast');
            if(id === 'spelling') {
                document.getElementById('robot-anchor-spelling').appendChild(robot);
                robot.className = 'robot-spelling-pos animate__animated animate__fadeInUp';
                updateSpeech("Mission 2! I will say a word, and you must click the letters in the correct order to spell it.");
                renderSpelling();
            } else if (id === 'learn') {
                updateSpeech(`Welcome ${state.studentName}! Mission 1: click the cards to learn the words!`);
                renderLearn();
            } else if (id === 'quiz') {
                updateSpeech("Final Castle! Listen to Leo and choose the correct word!");
                renderQuiz();
            } else if (id === 'sentences') {
                updateSpeech("Sentence Hero Mission! Read the sentence carefully and choose the missing word.");
                renderSentences();
            }
        }

        function renderLearn() {
            const grid = document.getElementById('learn-grid');
            grid.innerHTML = originalVocabulary.map((v, i) => `
                <div id="word-card-${i}" onclick="learnClick(this, '${v.word}')" class="glass p-6 cursor-pointer btn-bounce flex flex-col items-center group relative transition-all duration-300">
                    <div class="word-check absolute top-4 right-4 w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-white text-[10px] scale-0 transition-transform ${state.learnedWords.has(v.word) ? 'scale-100' : ''}">✓</div>
                    <span class="text-5xl">${v.icon}</span>
                    <span class="mt-4 font-bold-game text-xl text-indigo-600 uppercase">${v.word}</span>
                </div>
            `).join('');
        }

        function learnClick(el, word) {
            speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(word.toLowerCase());
            utter.lang = 'en-US'; speechSynthesis.speak(utter);
            const check = el.querySelector('.word-check');
            if (!state.learnedWords.has(word)) {
                check.classList.add('scale-100');
                state.learnedWords.add(word);
                state.stars++;
                document.getElementById('stars-count').innerText = state.stars;
            }
            if (state.learnedWords.size === originalVocabulary.length) {
                setTimeout(() => startMission('spelling'), 2000);
            }
        }

        async function startAutoLearn() {
            if(state.isAutoplaying) return;
            state.isAutoplaying = true;
            for(let i = 0; i < originalVocabulary.length; i++) {
                if(!state.isAutoplaying) break;
                const card = document.getElementById(`word-card-${i}`);
                card.classList.add('auto-play-highlight');
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(originalVocabulary[i].word.toLowerCase());
                utter.lang = 'en-US'; speechSynthesis.speak(utter);
                await new Promise(res => { utter.onend = res; setTimeout(res, 2000); });
                learnClick(card, originalVocabulary[i].word);
                card.classList.remove('auto-play-highlight');
            }
        }

        function renderSpelling() {
            if (state.spellingIdx >= originalVocabulary.length) {
                setTimeout(() => startMission('quiz'), 1500);
                return;
            }
            const current = originalVocabulary[state.spellingIdx];
            document.getElementById('spelling-progress').style.width = `${(state.spellingIdx/16)*100}%`;
            document.getElementById('spelling-icon').innerText = current.icon;
            document.getElementById('spelling-slots').innerHTML = current.word.split('').map(() => `<div class="w-12 h-14 border-4 border-dashed border-slate-300 rounded-xl flex items-center justify-center text-2xl font-bold-game text-indigo-600"></div>`).join('');
            const letters = current.word.split('').sort(() => Math.random() - 0.5);
            document.getElementById('spelling-letters').innerHTML = letters.map(l => `<button onclick="checkLetter('${l}', this)" class="w-12 h-12 glass font-bold-game text-xl btn-bounce uppercase">${l}</button>`).join('');
            
            document.getElementById('spelling-repeat-btn').onclick = () => {
                speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(current.word.toLowerCase());
                utter.lang = 'en-US';
                speechSynthesis.speak(utter);
            };
        }

        function checkLetter(l, btn) {
            const word = originalVocabulary[state.spellingIdx].word;
            const slots = document.getElementById('spelling-slots').children;
            const next = Array.from(slots).findIndex(s => s.innerText === "");
            
            speechSynthesis.cancel();
            const letterUtter = new SpeechSynthesisUtterance(l.toLowerCase());
            letterUtter.lang = 'en-US';
            speechSynthesis.speak(letterUtter);

            if(word[next] === l) {
                slots[next].innerText = l;
                btn.style.opacity = '0'; btn.style.pointerEvents = 'none';
                
                if(Array.from(slots).every(s => s.innerText !== "")) {
                    setTimeout(() => {
                        updateSpeech(word, () => {
                            celebrate();
                            state.spellingIdx++;
                            setTimeout(renderSpelling, 1000);
                        });
                    }, 400); 
                }
            } else {
                btn.classList.add('bg-red-200', 'animate__animated', 'animate__headShake');
                setTimeout(() => btn.classList.remove('bg-red-200', 'animate__animated', 'animate__headShake'), 500);
            }
        }

        function renderQuiz() {
            const card = document.getElementById('quiz-card');
            if(state.quizIdx >= originalVocabulary.length) {
                setTimeout(() => startMission('sentences'), 1500);
                return;
            }
            const current = originalVocabulary[state.quizIdx];

            speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(current.word.toLowerCase());
            utter.lang = 'en-US';
            speechSynthesis.speak(utter);

            let options = [current.word];
            while(options.length < 4) {
                let r = originalVocabulary[Math.floor(Math.random()*16)].word;
                if(!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random()-0.5);

            card.innerHTML = `
                <div onclick="repeatQuizWord('${current.word}')" class="text-9xl mb-8 animate__animated animate__pulse animate__infinite cursor-pointer hover:scale-110 transition-transform">${current.icon}</div>
                <div class="grid grid-cols-2 gap-4">
                    ${options.map(o => `
                        <button onclick="checkQuiz('${o}', this)" class="glass p-6 text-xl font-bold-game text-indigo-700 btn-bounce uppercase">${o}</button>
                    `).join('')}
                </div>
            `;
        }

        function repeatQuizWord(word) {
            speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(word.toLowerCase());
            utter.lang = 'en-US';
            speechSynthesis.speak(utter);
        }

        function checkQuiz(ans, btn) {
            const current = originalVocabulary[state.quizIdx];
            if(ans === current.word) {
                celebrate();
                btn.classList.add('bg-green-400');
                state.stars++;
                document.getElementById('stars-count').innerText = state.stars;
                state.quizCorrect++;
            } else {
                btn.classList.add('bg-red-400');
            }
            state.quizIdx++;
            setTimeout(renderQuiz, 1000);
        }

        function renderSentences() {
            if(state.sentenceIdx >= sentenceQuests.length) {
                finishQuest();
                return;
            }
            const current = sentenceQuests[state.sentenceIdx];
            document.getElementById('sentence-progress').style.width = `${(state.sentenceIdx / 16) * 100}%`;
            document.getElementById('sentence-display').innerHTML = current.text.replace("_", `<span id="target-slot" class="drop-zone">...</span>`);
            
            let options = [current.answer];
            while(options.length < 4) {
                let r = originalVocabulary[Math.floor(Math.random()*16)].word;
                if(!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random()-0.5);
            document.getElementById('sentence-options').innerHTML = options.map(o => `<button onclick="checkSentence('${o}', this)" class="glass p-4 text-lg font-bold-game text-slate-700 btn-bounce uppercase">${o}</button>`).join('');

            document.getElementById('sentence-repeat-btn').onclick = () => updateSpeech(current.text.replace("_", " [blank] "));
        }

        function checkSentence(ans, btn) {
            const current = sentenceQuests[state.sentenceIdx];
            if(ans === current.answer) {
                document.getElementById('target-slot').innerText = ans;
                btn.classList.add('bg-green-400');
                celebrate();
                state.stars++;
                document.getElementById('stars-count').innerText = state.stars;
                state.sentenceCorrect++;
                state.sentenceIdx++;
                setTimeout(renderSentences, 1500);
            } else {
                btn.classList.add('bg-red-400', 'animate__animated', 'animate__shakeX');
                setTimeout(() => btn.classList.remove('bg-red-400', 'animate__animated', 'animate__shakeX'), 500);
            }
        }

        function finishQuest() {
            const card = document.getElementById('sentence-card');
            const quizScore = Math.round((state.quizCorrect / 16) * 100);
            const sentenceScore = Math.round((state.sentenceCorrect / 16) * 100);
            const qualified = quizScore >= 80 && sentenceScore >= 80;

            if(qualified) {
                card.innerHTML = `
                    <h2 class="text-4xl font-bold-game text-yellow-500 mb-6">QUEST COMPLETE!</h2>
                    <div class="text-8xl mb-8">🏆</div>
                    <div class="flex justify-around mb-8">
                        <div>
                            <p class="text-indigo-600 font-bold uppercase text-sm">Vocabulary Quiz</p>
                            <p class="text-3xl font-bold-game">${quizScore}%</p>
                        </div>
                        <div>
                            <p class="text-green-600 font-bold uppercase text-sm">Sentence Master</p>
                            <p class="text-3xl font-bold-game">${sentenceScore}%</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button onclick="generateDiploma(${quizScore}, ${sentenceScore})" class="glass px-8 py-4 bg-indigo-600 text-white font-bold-game text-xl btn-bounce">GET YOUR GOLD DIPLOMA</button>
                        <button onclick="openDB()" class="glass px-8 py-4 bg-amber-500 text-white font-bold-game text-xl btn-bounce">VIEW RANKING</button>
                    </div>
                `;
                confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 } });
                updateSpeech("Incredible job! You mastered both exams. Here is your diploma!");
            } else {
                card.innerHTML = `
                    <h2 class="text-4xl font-bold-game text-slate-500 mb-6">KEEP PRACTICING!</h2>
                    <div class="text-8xl mb-8">💪</div>
                    <p class="text-xl font-game text-slate-600 mb-8">To get the diploma, you need 80% or more in both missions!</p>
                    <div class="flex justify-around mb-8">
                        <div>
                            <p class="text-indigo-600 font-bold uppercase text-sm">Quiz Score</p>
                            <p class="text-3xl font-bold-game ${quizScore < 80 ? 'text-red-500' : 'text-green-500'}">${quizScore}%</p>
                        </div>
                        <div>
                            <p class="text-green-600 font-bold uppercase text-sm">Sentence Score</p>
                            <p class="text-3xl font-bold-game ${sentenceScore < 80 ? 'text-red-500' : 'text-green-500'}">${sentenceScore}%</p>
                        </div>
                    </div>
                    <button onclick="location.reload()" class="glass px-8 py-4 bg-orange-500 text-white font-bold-game text-xl btn-bounce">TRY AGAIN</button>
                `;
            }
        }

        async function openDB() {
            const list = document.getElementById('db-list-content');
            list.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-400">Loading ranking...</td></tr>';
            document.getElementById('db-modal').classList.remove('hidden');
            
            const data = await window.fetchGameRecords();
            if (data.length === 0) {
                list.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-400">No records found yet.</td></tr>';
                return;
            }

            // Sort by scores in memory
            data.sort((a, b) => (b.quizScore + b.sentenceScore) - (a.quizScore + a.sentenceScore));

            list.innerHTML = data.map(item => `
                <tr class="border-b border-indigo-50 hover:bg-indigo-50/30 transition-colors">
                    <td class="p-4 font-bold-game text-slate-700">${item.name}</td>
                    <td class="p-4 text-indigo-600 font-bold">${item.quizScore}%</td>
                    <td class="p-4 text-green-600 font-bold">${item.sentenceScore}%</td>
                    <td class="p-4 text-slate-400 text-sm">${item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleDateString() : 'Today'}</td>
                </tr>
            `).join('');
        }

        function closeDB() {
            document.getElementById('db-modal').classList.add('hidden');
        }

        async function generateDiploma(qScore, sScore) {
            // Guardar en DB antes de generar
            await window.saveGameRecord(state.studentName, qScore, sScore);

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); 
            doc.setFillColor(245, 243, 255); 
            doc.rect(0, 0, 297, 210, 'F');
            doc.setDrawColor(99, 102, 241); 
            doc.setLineWidth(1.5);
            doc.rect(10, 10, 277, 190);
            doc.setLineWidth(0.5);
            doc.rect(13, 13, 271, 184);
            const cornerSize = 25;
            doc.setLineWidth(2);
            doc.line(10, 10 + cornerSize, 10, 10); doc.line(10, 10, 10 + cornerSize, 10);
            doc.line(287 - cornerSize, 10, 287, 10); doc.line(287, 10, 287, 10 + cornerSize);
            doc.line(10, 200 - cornerSize, 10, 200); doc.line(10, 200, 10 + cornerSize, 200);
            doc.line(287 - cornerSize, 200, 287, 200); doc.line(287, 200, 287, 200 - cornerSize);
            
            doc.setTextColor(67, 56, 202); 
            doc.setFont("helvetica", "bold");
            doc.setFontSize(32);
            doc.text("CERTIFICATE OF ACHIEVEMENT", 148.5, 30, {align:'center'});
            doc.setFontSize(16);
            doc.text("UNIT 9 SECOND GRADE", 148.5, 38, {align:'center'});
            
            doc.setDrawColor(224, 231, 255);
            doc.line(60, 42, 237, 42);
            doc.setTextColor(100, 116, 139); 
            doc.setFontSize(14);
            doc.setFont("helvetica", "normal");
            doc.text("THIS IS PROUDLY PRESENTED TO", 148.5, 52, {align:'center'});
            
            doc.setTextColor(30, 41, 59); 
            doc.setFontSize(40);
            doc.setFont("helvetica", "bold");
            doc.text(state.studentName.toUpperCase(), 148.5, 68, {align:'center'});
            
            doc.setTextColor(100, 116, 139);
            doc.setFontSize(14);
            doc.setFont("helvetica", "normal");
            doc.text("For successfully completing the LinguoKids Word Quest Challenge", 148.5, 78, {align:'center'});
            doc.text("and demonstrating mastery in Second Grade Vocabulary.", 148.5, 84, {align:'center'});

            doc.setTextColor(79, 70, 229);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("MASTERED VOCABULARY:", 148.5, 95, {align:'center'});
            
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(51, 65, 85);
            const words = originalVocabulary.map(v => v.word);
            const mid = Math.ceil(words.length / 2);
            const leftCol = words.slice(0, mid).join("  •  ");
            const rightCol = words.slice(mid).join("  •  ");
            doc.text(leftCol, 148.5, 102, {align:'center'});
            doc.text(rightCol, 148.5, 107, {align:'center'});

            doc.setFillColor(238, 242, 255);
            doc.roundedRect(60, 115, 80, 22, 3, 3, 'F');
            doc.setTextColor(79, 70, 229);
            doc.setFontSize(10);
            doc.text("VOCABULARY QUIZ", 100, 122, {align:'center'});
            doc.setFontSize(18);
            doc.text(`${qScore}%`, 100, 131, {align:'center'});
            
            doc.setFillColor(240, 253, 244);
            doc.roundedRect(157, 115, 80, 22, 3, 3, 'F');
            doc.setTextColor(22, 163, 74);
            doc.setFontSize(10);
            doc.text("SENTENCE MASTERY", 197, 122, {align:'center'});
            doc.setFontSize(18);
            doc.text(`${sScore}%`, 197, 131, {align:'center'});
            
            const date = new Date().toLocaleDateString();
            doc.setTextColor(100, 116, 139);
            doc.setFontSize(11);
            doc.text(`DATE: ${date}`, 60, 165);
            doc.line(180, 160, 250, 160);
            doc.text("LEO THE ROBOT", 215, 165, {align:'center'});
            
            doc.setDrawColor(251, 191, 36); 
            doc.setLineWidth(1);
            doc.circle(260, 145, 18);
            doc.setFontSize(8);
            doc.setTextColor(180, 83, 9);
            doc.text("CERTIFIED", 260, 143, {align:'center'});
            doc.text("EXCELLENCE", 260, 148, {align:'center'});
            doc.setFontSize(14);
            doc.text("★", 260, 158, {align:'center'});
            
            doc.save(`Diploma_LinguoKids_Unit10_${state.studentName}.pdf`);
        }
    </script>
</body>
</html>
